syntax = "proto3";

package gameserver.core;

option csharp_namespace = "GameServer.Core.Protocol";

service CenterService {
  rpc Auth (AuthRequest) returns (AuthReply);
  rpc ValidateToken (ValidateTokenRequest) returns (ValidateTokenReply);
  rpc RegisterService (RegisterServiceRequest) returns (RegisterServiceReply);
  rpc ResolveService (ResolveServiceRequest) returns (ResolveServiceReply);
  rpc ListServiceEndpoints (ListServiceEndpointsRequest) returns (ListServiceEndpointsReply);
}

service GateService {
  rpc Login (LoginRequest) returns (LoginReply);
  rpc ListGameWorkers (ListGameWorkersRequest) returns (ListGameWorkersReply);
  rpc PrepareRoomConnection (PrepareRoomConnectionRequest) returns (PrepareRoomConnectionReply);
  rpc Forward (ForwardRequest) returns (ForwardReply);
}

service GameIngress {
  rpc Handle (GameRequest) returns (GameResponse);
}

enum DirectTransportProtocol {
  DIRECT_TRANSPORT_PROTOCOL_UNSPECIFIED = 0;
  DIRECT_TRANSPORT_PROTOCOL_TCP = 1;
  DIRECT_TRANSPORT_PROTOCOL_KCP = 2;
}

enum GameId {
  GAME_ID_UNSPECIFIED = 0;
  GAME_ID_GAME001 = 1;
}

message ServiceEndpoint {
  GameId game_id = 1;
  string target = 2;
  string route_id = 3;
  string address = 4;
  DirectTransportProtocol direct_protocol = 5;
  string direct_address = 6;
}

message AuthRequest {
  string login_type = 1;
  string credential = 2;
  string device_id = 3;
  string client_version = 4;
}

message AuthReply {
  int32 error = 1;
  string token = 2;
  int64 uid = 3;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenReply {
  int32 error = 1;
  int64 uid = 2;
}

message RegisterServiceRequest {
  ServiceEndpoint endpoint = 1;
}

message RegisterServiceReply {
  int32 error = 1;
}

message ResolveServiceRequest {
  GameId game_id = 1;
  string target = 2;
  string route_id = 3;
}

message ResolveServiceReply {
  int32 error = 1;
  ServiceEndpoint endpoint = 2;
}

message ListServiceEndpointsRequest {
  string target = 1;
}

message ListServiceEndpointsReply {
  int32 error = 1;
  repeated ServiceEndpoint endpoints = 2;
}

message ClientEnvelope {
  GameId game_id = 1;
  string target = 2;
  string route_id = 3;
  bytes data = 4;
}

message LoginRequest {
  string login_type = 1;
  string credential = 2;
  string device_id = 3;
  string client_version = 4;
}

message LoginReply {
  int32 error = 1;
  string token = 2;
  int64 uid = 3;
}

message ListGameWorkersRequest {
  string token = 1;
  string target = 2;
}

message GameWorkerInfo {
  GameId game_id = 1;
  string target = 2;
  string route_id = 3;
}

message ListGameWorkersReply {
  int32 error = 1;
  repeated GameWorkerInfo workers = 2;
}

message PrepareRoomConnectionRequest {
  string token = 1;
  GameId game_id = 2;
  string target = 3;
  string route_id = 4;
}

message PrepareRoomConnectionReply {
  int32 error = 1;
  GameId game_id = 2;
  string target = 3;
  string route_id = 4;
  DirectTransportProtocol direct_protocol = 5;
  string host = 6;
  int32 port = 7;
  string connect_ticket = 8;
}

message ForwardRequest {
  string token = 1;
  ClientEnvelope envelope = 2;
}

message ForwardReply {
  int32 error = 1;
  bytes data = 2;
}

message GameRequest {
  int64 uid = 1;
  string session_id = 2;
  GameId game_id = 3;
  string target = 4;
  string route_id = 5;
  bytes data = 6;
}

message GameResponse {
  int32 error = 1;
  bytes data = 2;
}
